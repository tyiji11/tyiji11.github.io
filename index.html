<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>唐彝吉 | HRM Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="left-top">
          <h1 id="name"></h1>
          <p id="role" class="role"></p>
          <p id="tagline" class="tagline"></p>
          <div class="meta-row">
            <article class="meta">
              <p id="m1n" class="meta-name"></p>
              <p id="m1v" class="meta-value"></p>
            </article>
            <article class="meta">
              <p id="m2n" class="meta-name"></p>
              <p id="m2v" class="meta-value"></p>
            </article>
            <article class="meta">
              <p id="m3n" class="meta-name"></p>
              <p id="m3v" class="meta-value"></p>
            </article>
          </div>
        </div>

        <aside class="right-top">
          <h2 id="contact-title" class="contact-title"></h2>
          <p id="c1" class="contact-item"></p>
          <p id="c2" class="contact-item"></p>
          <p id="c3" class="contact-item"></p>
          <p id="c4" class="contact-item"></p>
          <div class="lang-wrap" role="tablist" aria-label="Language switcher">
            <button id="lang-zh" class="lang-btn active" aria-selected="true">中文</button>
            <button id="lang-en" class="lang-btn" aria-selected="false">EN</button>
          </div>
        </aside>
      </section>

      <section class="main-grid">
        <div class="left-col">
          <article class="card">
            <h2 id="skills-title"></h2>
            <ul id="skills-list"></ul>
          </article>

          <article class="card">
            <h2 id="edu-title"></h2>
            <ul id="edu-list"></ul>
          </article>

          <article class="card highlight">
            <h2 id="pref-title"></h2>
            <ul id="pref-list"></ul>
          </article>
        </div>

        <div class="right-col">
          <article class="card">
            <h2 id="exp-title" class="big-title"></h2>
            <div id="jobs" class="jobs"></div>
          </article>

          <article class="card">
            <h2 id="proj-title" class="big-title"></h2>
            <ul id="proj-list"></ul>
          </article>
        </div>
      </section>

      <div class="accent"></div>
      <footer id="footer" class="footer"></footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
